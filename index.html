<body>
  <section class="auth-screen" id="authScreen"><form class="auth-card" id="loginForm"><div class="brand"><div class="brand-mark"><i data-lucide="factory"></i></div><div><h2>善水工商地產-工廠客戶拜訪管理系統</h2><p>請登入後使用系統。</p></div></div><div class="field"><label for="loginUsername">帳號</label><input id="loginUsername" autocomplete="username" value="admin" required></div><div class="field"><label for="loginPassword">密碼</label><input id="loginPassword" type="password" autocomplete="current-password" value="admin123" required></div><div class="error" id="loginError"></div><button class="primary-button" type="submit"><i data-lucide="log-in"></i>登入</button><p class="subtext">預設管理員：admin / admin123。正式使用前請新增管理員並停用預設帳號。</p></form></section>
  <div class="app-shell hidden" id="appShell"><header class="topbar"><div class="brand"><div class="brand-mark"><i data-lucide="factory"></i></div><div><h1>善水工商地產-工廠客戶拜訪管理系統</h1><p>客戶名單、分級、拜訪追蹤與數據儀表板</p></div></div><div class="top-actions"><span class="user-chip" id="userChip"></span><button class="icon-button" id="refreshBtn" title="重新載入"><i data-lucide="refresh-cw"></i></button><button class="ghost-button" id="usersBtn"><i data-lucide="users"></i>使用者</button><button class="ghost-button" id="salespeopleBtn"><i data-lucide="briefcase-business"></i>業務人員</button><button class="ghost-button" id="logsBtn"><i data-lucide="list-checks"></i>記錄</button><button class="ghost-button" id="exportBtn"><i data-lucide="download"></i>匯出追蹤</button><a class="primary-button" href="https://docs.google.com/spreadsheets/d/185NZwvJFPTsgi0H99mpl8KsDg_cMxxRbIwGu0N2Agko/edit?usp=sharing" target="_blank" rel="noreferrer"><i data-lucide="external-link"></i>開啟原始表格</a><button class="ghost-button danger-button" id="logoutBtn"><i data-lucide="log-out"></i>登出</button></div></header><nav class="tabs"><button class="tab-button active" data-view="list"><i data-lucide="table-2"></i>名單管理</button><button class="tab-button" data-view="dashboard"><i data-lucide="chart-no-axes-combined"></i>數據儀表板</button></nav><section class="filters" id="filtersBar"><div class="field"><label for="searchInput">搜尋</label><div class="input-wrap"><i data-lucide="search"></i><input id="searchInput" type="search" placeholder="公司、地址、負責人、電話、拜訪內容"></div></div><div class="field"><label for="regionFilter">區域</label><select id="regionFilter"></select></div><div class="field"><label for="gradeFilter">客戶分級</label><select id="gradeFilter"></select></div><div class="field"><label for="statusFilter">追蹤狀態</label><select id="statusFilter"><option value="">全部狀態</option><option value="todo">未處理</option><option value="follow">待追蹤</option><option value="visited">已拜訪</option><option value="closed">暫不處理</option></select></div><div class="field"><label for="quickFilter">快速條件</label><select id="quickFilter"><option value="">全部名單</option><option value="hasPhone">有電話</option><option value="hasFeedback">已有拜訪回報</option><option value="needsFeedback">尚無拜訪回報</option></select></div><button class="ghost-button" id="resetBtn"><i data-lucide="rotate-ccw"></i>清除</button></section><main class="list-view" id="listView"><div class="list-layout"><section><div class="summary-grid" id="summaryGrid"></div><section class="list-panel"><div class="panel-head"><h2>名單</h2><span class="count-pill" id="resultCount">0 筆</span></div><div class="error" id="errorBox"></div><div class="loading" id="loadingBox">正在載入資料...</div><div class="table-wrap"><table><thead><tr><th>公司</th><th>區域</th><th>分級</th><th>電話</th><th>開發業務</th><th>代辦業者</th><th>追蹤</th><th>拜訪回報</th><th>操作</th></tr></thead><tbody id="tableBody"></tbody></table></div></section></section><aside class="detail-panel" id="detailPanel"><div class="empty-detail">選取左側公司後，這裡會顯示完整資料與追蹤紀錄。</div></aside></div></main><main class="dashboard-view hidden" id="dashboardView"><div id="dashboardContent"></div></main></div>
  <section class="modal-backdrop" id="usersModal"><div class="modal"><div class="panel-head"><h2>使用者管理</h2><button class="mini-button" data-close="usersModal"><i data-lucide="x"></i></button></div><div class="modal-body"><div class="storage-status" id="usersStorageStatus">正在檢查儲存狀態...</div><form class="form-grid" id="userForm"><div class="field"><label>帳號</label><input id="newUsername" required></div><div class="field"><label>名稱</label><input id="newDisplayName"></div><div class="field"><label>角色</label><select id="newRole"><option value="user">一般使用者</option><option value="admin">管理員</option></select></div><div class="field"><label>密碼</label><input id="newPassword" type="password" required></div><button class="primary-button" type="submit"><i data-lucide="user-plus"></i>新增</button></form><div class="table-wrap"><table class="compact-table"><thead><tr><th>帳號</th><th>名稱</th><th>角色</th><th>狀態</th><th>新密碼</th><th>操作</th></tr></thead><tbody id="usersBody"></tbody></table></div></div></div></section>
  <section class="modal-backdrop" id="salespeopleModal"><div class="modal"><div class="panel-head"><h2>業務人員名單</h2><button class="mini-button" data-close="salespeopleModal"><i data-lucide="x"></i></button></div><div class="modal-body"><form class="form-grid" id="salespersonForm"><div class="field"><label>業務姓名</label><input id="newSalespersonName" required></div><div class="field"><label>狀態</label><select id="newSalespersonActive"><option value="true">啟用</option><option value="false">停用</option></select></div><button class="primary-button" type="submit"><i data-lucide="plus"></i>新增業務</button></form><div class="table-wrap"><table class="compact-table"><thead><tr><th>業務姓名</th><th>狀態</th><th>建立時間</th><th>操作</th></tr></thead><tbody id="salespeopleBody"></tbody></table></div></div></div></section>
  <section class="modal-backdrop" id="logsModal"><div class="modal"><div class="panel-head"><h2>操作記錄</h2><button class="mini-button" data-close="logsModal"><i data-lucide="x"></i></button></div><div class="modal-body"><div class="table-wrap"><table class="compact-table"><thead><tr><th>時間</th><th>使用者</th><th>動作</th><th>結果</th><th>內容</th></tr></thead><tbody id="logsBody"></tbody></table></div></div></div></section><div class="toast" id="toast"></div>
  <script>
    const statusLabels={todo:"未處理",follow:"待追蹤",visited:"已拜訪",closed:"暫不處理"};
    const gradeOptions=["未分級","潛能","D","C","B","A","AA","光多辦理"];
    const defaultGradeFilter="A+AA";
    const state={records:[],filtered:[],selectedId:null,local:{},profiles:{},salespeople:[],currentUser:null,activeView:"list",filtersInitialized:false};
    const el={};
    document.addEventListener("DOMContentLoaded",()=>{["authScreen","appShell","loginForm","loginUsername","loginPassword","loginError","summaryGrid","tableBody","resultCount","loadingBox","errorBox","detailPanel","searchInput","regionFilter","gradeFilter","statusFilter","quickFilter","resetBtn","refreshBtn","exportBtn","toast","userChip","logoutBtn","usersBtn","salespeopleBtn","logsBtn","usersModal","salespeopleModal","logsModal","userForm","usersBody","logsBody","newUsername","newDisplayName","newRole","newPassword","usersStorageStatus","salespersonForm","newSalespersonName","newSalespersonActive","salespeopleBody","filtersBar","listView","dashboardView","dashboardContent"].forEach(id=>el[id]=document.getElementById(id));bindEvents();refreshIcons();boot();});
    function refreshIcons(){if(window.lucide)lucide.createIcons()}
    async function api(path,options={}){const response=await fetch(path,{credentials:"same-origin",headers:{"Content-Type":"application/json",...(options.headers||{})},...options});if(!response.ok){let payload={};try{payload=await response.json()}catch{}const error=new Error(payload.message||`HTTP ${response.status}`);error.status=response.status;throw error}const type=response.headers.get("content-type")||"";return type.includes("application/json")?response.json():response.text()}
    function bindEvents(){el.loginForm.addEventListener("submit",async e=>{e.preventDefault();await login()});["input","change"].forEach(n=>[el.searchInput,el.regionFilter,el.gradeFilter,el.statusFilter,el.quickFilter].forEach(x=>x.addEventListener(n,applyFilters)));el.resetBtn.addEventListener("click",()=>{el.searchInput.value="";el.regionFilter.value="";el.gradeFilter.value=defaultGradeFilter;el.statusFilter.value="";el.quickFilter.value="";applyFilters()});el.refreshBtn.addEventListener("click",loadData);el.exportBtn.addEventListener("click",exportStates);el.logoutBtn.addEventListener("click",logout);el.usersBtn.addEventListener("click",openUsers);el.salespeopleBtn.addEventListener("click",openSalespeople);el.logsBtn.addEventListener("click",openLogs);el.userForm.addEventListener("submit",createUser);el.salespersonForm.addEventListener("submit",createSalesperson);document.querySelectorAll("[data-close]").forEach(b=>b.addEventListener("click",()=>document.getElementById(b.dataset.close).classList.remove("show")));document.querySelectorAll("[data-view]").forEach(b=>b.addEventListener("click",()=>switchView(b.dataset.view)))}
    async function boot(){try{const session=await api("/api/session");state.currentUser=session.user;showApp();await loadData()}catch{showLogin()}}
    async function login(){try{el.loginError.style.display="none";const result=await api("/api/login",{method:"POST",body:JSON.stringify({username:el.loginUsername.value.trim(),password:el.loginPassword.value})});state.currentUser=result.user;showApp();await loadData()}catch(error){el.loginError.textContent=error.message;el.loginError.style.display="block";showToast(error.message)}}
    async function logout(){await api("/api/logout",{method:"POST",body:"{}"}).catch(()=>{});state.currentUser=null;showLogin()}
    function showApp(){el.authScreen.classList.add("hidden");el.appShell.classList.remove("hidden");el.userChip.textContent=`${state.currentUser.displayName||state.currentUser.username}（${state.currentUser.role==="admin"?"管理員":"使用者"}）`;const admin=state.currentUser.role==="admin";el.usersBtn.style.display=admin?"inline-flex":"none";el.salespeopleBtn.style.display=admin?"inline-flex":"none";el.logsBtn.style.display=admin?"inline-flex":"none";switchView(state.activeView);refreshIcons()}
    function showLogin(){el.appShell.classList.add("hidden");el.authScreen.classList.remove("hidden");refreshIcons()}
    function switchView(view){state.activeView=view;document.querySelectorAll("[data-view]").forEach(b=>b.classList.toggle("active",b.dataset.view===view));el.filtersBar.classList.toggle("hidden",view!=="list");el.listView.classList.toggle("hidden",view!=="list");el.dashboardView.classList.toggle("hidden",view!=="dashboard");renderDashboard();refreshIcons()}
    async function loadData(){setLoading(true);hideError();try{const [csv,states]=await Promise.all([api("/api/factories.csv"),api("/api/customer-states")]);state.local=states.customerStates||{};state.profiles=states.customerProfiles||{};state.salespeople=states.salespeople||[];const rows=parseCsv(csv);const [headers,...body]=rows;state.records=body.map((row,index)=>applyCustomerProfile(normalizeRecord(headers,row,index))).filter(r=>r.company||r.factoryId||r.address);if(!state.records.some(r=>r.id===state.selectedId))state.selectedId=state.records[0]?.id||null;populateFilters();applyFilters();showToast(`已載入 ${state.records.length} 筆資料`)}catch(error){state.records=[];state.filtered=[];renderAll();showError(error.message||"資料載入失敗")}finally{setLoading(false)}}
    function parseCsv(text){const rows=[];let row=[],cell="",q=false;for(let i=0;i<text.length;i++){const c=text[i],n=text[i+1];if(c=='"'&&q&&n=='"'){cell+='"';i++}else if(c=='"')q=!q;else if(c===","&&!q){row.push(cell);cell=""}else if((c==="\n"||c==="\r")&&!q){if(c==="\r"&&n==="\n")i++;row.push(cell);rows.push(row);row=[];cell=""}else cell+=c}if(cell||row.length){row.push(cell);rows.push(row)}return rows.filter(r=>r.some(v=>String(v).trim()!==""))}
    function normalizeRecord(headers,row,index){const o={};headers.forEach((h,i)=>o[clean(h).replace(/^\uFEFF/,"")]=clean(row[i]));const factoryId=o["工廠登記編號"]||o["廠編"]||o["編號"]||"",sourceCompany=o["公司名稱"]||o["廠名"]||o["公司"]||"",region=o["所屬區域"]||o["區域"]||"",address=o["工廠地址"]||o["地址"]||o["廠址"]||"";const record={id:"",localKey:"",index,region,factoryId,sourceCompany,company:sourceCompany,address,owner:o["負責人姓名"]||o["負責人"]||o["聯絡人"]||"",phone:o["電話"]||o["聯絡電話"]||o["手機"]||"",grade:clean(o["客戶分級"]||o["分級"]||o["等級"]).toUpperCase(),feedback:o["拜訪回報"]||o["拜訪紀錄"]||o["進度回報"]||o["回報"]||o["進度"]||"",agencyType:o["代辦業者"]||o["代辦"]||o["業者"]||""};record.id=makeRecordKey(record);record.localKey=makeStableKey(record);return record}
    function makeRecordKey(r){return [r.factoryId||"NOID",r.region||"",r.sourceCompany||r.company||"",r.address||"",String(r.index)].map(v=>encodeURIComponent(clean(v))).join("::")}function makeStableKey(r){return [clean(r.factoryId)||clean(r.sourceCompany)||clean(r.company)||"NOID",clean(r.region),clean(r.address),clean(r.owner)].filter(Boolean).map(v=>encodeURIComponent(v)).join("::")}

    async function saveCustomerProfile(id,patch){const button=document.getElementById("saveProfileBtn"),record=state.records.find(r=>r.id===id);try{if(button){button.disabled=true;button.innerHTML='<i data-lucide="loader"></i>儲存中'}const localKey=record?.localKey||id;const result=await api(`/api/customers/${encodeURIComponent(localKey)}`,{method:"PUT",body:JSON.stringify({...patch,...recordContext(record||{})})});state.profiles[localKey]=result.customerProfile;if(record&&record.id!==localKey)state.profiles[record.id]=result.customerProfile;if(record){Object.assign(record,applyCustomerProfile({...record,...patch}))}populateFilters();applyFilters();const sync=result.sheetSync;if(sync?.queued){showToast(sync.regionSheetOk?`資料已儲存，區域頁同步中${sync.regionSheet?`：${sync.regionSheet}`:""}`:"資料已儲存，等待區域頁寫入")}else if(sync?.enabled){showToast(sync.ok?`區域頁${sync.regionSheetOk?" / ":""}總表已同步：第 ${sync.row||"-"} 列`:`Google Sheet 寫回失敗：${sync.regionSheetMessage||sync.message||"未取得回應"}`)}else{showToast("客戶資料已存後端；Google Sheet 寫回尚未設定")}}catch(error){showToast(error.message||"客戶資料儲存失敗");if(error.status===401){showLogin()}}finally{if(button){button.disabled=false}refreshIcons()}}

    function mergeSavedFeedback(id,note,salesperson){const cleanNote=clean(note);if(!cleanNote)return;const record=state.records.find(r=>r.id===id);if(!record)return;if(record.feedback&&record.feedback.includes(cleanNote))return;const today=new Date(),stamp=`${String(today.getMonth()+1).padStart(2,"0")}/${String(today.getDate()).padStart(2,"0")}`;const author=salesperson?`（${salesperson}）`:"";const displayLog=`【${stamp}】 ${cleanNote}${author}`;record.feedback=record.feedback?`${displayLog}\n${record.feedback}`:displayLog}
    function renderDashboard(){if(!el.dashboardContent)return;const total=state.records.length,visited=state.records.filter(hasFeedback).length,unvisited=Math.max(total-visited,0),high=state.records.filter(isHighValue).length,follow=state.records.filter(r=>getLocal(r).status==="follow").length,weekUpdates=state.records.filter(r=>isThisWeek(getLocal(r).updatedAt)).length,weekReports=state.records.filter(r=>isThisWeek(getLocal(r).updatedAt)&&clean(getLocal(r).note)).length;const regions=buildRegionStats();const blind=regions.filter(r=>r.blind).sort((a,b)=>b.total-a.total);el.dashboardContent.innerHTML=`<div class="dashboard-metrics">${metric("總名單數",total,"全部客戶")}${metric("已拜訪數",visited,percent(visited,total))}${metric("未拜訪數",unvisited,"尚未有拜訪回報")}${metric("整體拜訪率",percentNumber(visited,total),"已拜訪 / 總名單")}${metric("A+AA 客戶數",high,percent(high,total))}${metric("待追蹤數",follow,"追蹤狀態")}${metric("本週新增回報數",weekReports,"後端紀錄")}${metric("本週完成追蹤數",weekUpdates,"本週更新")}</div><div class="dashboard-grid"><section class="dashboard-panel"><div class="panel-head"><h2>區域戰情</h2><span class="count-pill">${regions.length} 區</span></div><div class="table-wrap"><table class="dashboard-table"><thead><tr><th>區域</th><th>總名單</th><th>已拜訪</th><th>拜訪率</th><th>A+AA</th><th>待追蹤</th><th>未分級</th><th>判定</th></tr></thead><tbody>${regions.map(row=>`<tr><td><strong>${escapeHtml(row.region)}</strong></td><td>${row.total}</td><td>${row.visited}</td><td class="bar-cell"><div class="bar-track"><div class="bar-fill" style="width:${Math.min(row.visitRate,100)}%"></div></div><span class="subtext">${Math.round(row.visitRate)}%</span></td><td>${row.high}</td><td>${row.follow}</td><td>${row.ungraded}</td><td>${row.blind?'<span class="badge-warn">優先補強</span>':'-'}</td></tr>`).join("")}</tbody></table></div></section><section class="dashboard-panel"><div class="panel-head"><h2>優先補強區</h2><span class="count-pill">${blind.length} 區</span></div><div class="priority-list">${blind.length?blind.slice(0,8).map(row=>`<div class     function buildRegionStats(){const groups=new Map();state.records.forEach(r=>{const key=r.region||"未填區域";if(!groups.has(key))groups.set(key,{region:key,total:0,visited:0,high:0,follow:0,ungraded:0});const row=groups.get(key);row.total++;if(hasFeedback(r))row.visited++;if(isHighValue(r))row.high++;if(getLocal(r).status==="follow")row.follow++;if(isUngraded(effectiveGrade(r)))row.ungraded++});const rows=[...groups.values()].map(row=>({...row,visitRate:row.total?row.visited/row.total*100:0})).sort((a,b)=>b.total-a.total);const avg=rows.length?rows.reduce((sum,row)=>sum+row.total,0)/rows.length:0;return rows.map(row=>({...row,blind:row.total>=avg&&row.visitRate<15}))}

    async function openLogs(){if(state.currentUser.role!=="admin")return;const data=await api("/api/audit-logs?limit=150");el.logsBody.innerHTML=data.auditLogs.map(log=>`<tr><td>${formatDate(log.at)}</td><td>${escapeHtml(log.username||"-")}</td><td>${escapeHtml(actionLabel(log.action))}</td><td>${log.success?"成功":"失敗"}</td><td>${escapeHtml(JSON.stringify(log.details||{}))}</td></tr>`).join("");el.logsModal.classList.add("show");refreshIcons()}
    function selectRecord(id){state.selectedId=id;renderAll()}
    function getLocal(recordOrId){const record=typeof recordOrId==="object"?recordOrId:state.records.find(r=>r.id===recordOrId)||state.records.find(r=>r.localKey===recordOrId);const primary=typeof recordOrId==="string"?recordOrId:recordOrId?.localKey||recordOrId?.id;return{status:"todo",grade:"",note:"",nextDate:"",salesperson:"",agencyType:"",...(state.local[primary]||{}),...((!state.local[primary]&&record?.id)?state.local[record.id]||{}:{}),...((!state.local[primary]&&record?.factoryId)?state.local[record.factoryId]||{}:{})}}
    function effectiveGrade(r){const g=getLocal(r).grade;return g&&g!=="未分級"?g:(g==="未分級"?"未分級":(r.grade||"未分級"))}
    function getFeedbackText(r){const local=getLocal(r);return [clean(r.feedback),clean(local.note)].filter(Boolean).join("\n")}function hasFeedback(r){return Boolean(clean(getFeedbackText(r)))}function normalizeStatus(status){return status==="待追蹤"?"follow":status==="已拜訪"?"visited":status==="暫不處理"?"closed":status==="未處理"?"todo":status||"todo"}function isFollowStatus(status){return normalizeStatus(status)==="follow"}
    function isHighValue(r){return ["A","AA"].includes(effectiveGrade(r))}
    function isUngraded(g){return !g||g==="未分級"}
    function infoRow(label,value){return`<div class="info-row"><dt>${label}</dt><dd>${value||`<span class="subtext">未填</span>`}</dd></div>`}
    function gradeBadge(grade){const g=grade||"未分級",c=g==="未分級"?"grade-empty":`grade-${g.toLowerCase()}`;return`<span class="grade ${c}">${escapeHtml(g)}</span>`}
    function statusBadge(status){const s=normalizeStatus(status);return`<span class="local-status ${s}">${statusLabels[s]||"未處理"}</span>`}
    function shortText(t,l){const v=clean(t).replace(/\s+/g," ");return v.length>l?`${v.slice(0,l)}...`:v}
    function clean(v){return String(v??"").replace(/\u00a0/g," ").trim()}
    async function copyRecord(r){const local=getLocal(r);await navigator.clipboard.writeText([`公司：${r.company}`,`分級：${effectiveGrade(r)}`,`區域：${r.region}`,`負責人：${r.owner||""}`,`電話：${r.phone||""}`,`地址：${r.address||""}`,`開發業務：${local.salesperson||""}`,`代辦業者：${local.agencyType||""}`,`追蹤狀態：${statusLabels[local.status]}`,`拜訪回報：${r.feedback||""}`,`追蹤備註：${local.note||""}`].join("\n"));showToast("已複製客戶資料")}
    function exportStates(){const blob=new Blob([JSON.stringify(state.local,null,2)],{type:"application/json;charset=utf-8"}),url=URL.createObjectURL(blob),link=document.createElement("a");link.href=url;link.download=`factory-crm-states-${new Date().toISOString().slice(0,10)}.json`;link.click();URL.revokeObjectURL(url)}
    function isThisWeek(value){if(!value)return false;const d=new Date(value);if(Number.isNaN(d.getTime()))return false;const now=new Date(),start=new Date(now);start.setDate(now.getDate()-((now.getDay()+6)%7));start.setHours(0,0,0,0);return d>=start}
    function percentNumber(v,b){return b?`${Math.round(v/b*100)}%`:"0%"}
    function setLoading(v){el.loadingBox.style.display=v?"block":"none"}
    function showError(m){el.errorBox.textContent=m;el.errorBox.style.display="block"}
    function hideError(){el.errorBox.style.display="none";el.errorBox.textContent=""}
    function showToast(m){el.toast.textContent=m;el.toast.classList.add("show");clearTimeout(showToast.timer);showToast.timer=setTimeout(()=>el.toast.classList.remove("show"),2200)}
    function formatDate(v){return v?new Date(v).toLocaleString("zh-TW",{hour12:false}):""}
    function actionLabel(a){return({LOGIN:"登入",LOGOUT:"登出",LOGIN_FAILED:"登入失敗",SAVE_CUSTOMER_STATE:"儲存客戶資料",CREATE_USER:"新增使用者",UPDATE_USER:"更新使用者",CREATE_SALESPERSON:"新增業務人員",UPDATE_SALESPERSON:"更新業務人員",UPDATE_CUSTOMER_PROFILE:"更新客戶基本資料"})[a]||a}
    function escapeHtml(v){return String(v??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;")}
  </script>
</body>
</html>
